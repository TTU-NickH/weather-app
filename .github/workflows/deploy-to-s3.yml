#Name shown in the GitHub Actions tab
name: Deploy Weather App to S3

# Runs the workflow when code is pushed to the main branch
on:
  push:
    branches:
      - main


# Jobs are the tasks GitHub Actions will run 
jobs:
  deploy:
    #GitHub will use a temporary Ubuntu Linux machine
    runs-on: ubuntu-latest

    steps:
      # Downloads repo files onto the temporary machine
      - name: Checkout repository
        uses: actions/checkout@4

      # Configures AWS credentials using GitHub Secrets
      # This lets GitHub connect to the AWS account safely
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      
      - name: Deploy static site to S3
        run: aws s3 sync . s3://${{ secrets.S3_BUCKET }} --delete --exclude ".git/*" --exclude ".github/*"