<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Weather App">
    <title>Weather App</title>
    <link rel="icon" href="weather-icon.png">
    <link rel="apple-touch-icon" href="weather-icon.png">
    <meta name="theme-color" content="#2c3e50">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"/>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/flatly/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
  </head>

  <body class="bg-dark">
    <div class="min-vh-100 d-flex align-items-center justify-content-center px-5">
      <div style="max-width: 760px; width: 100%">
        <!--Top thin card that has user type in city then display the information-->
        <div class="bg-light border rounded-top text-center py-2">
          <div class="row justify-content-center align-items-center">
            <div class="col-12 col-md-6 mb-2 mb-md-0">
              <input id="txtCityInput" type="text" class="form-control" placeholder="Enter city name!"/>
            </div>
            <div class="col-12 col-md-3">
              <button id="btnGetWeather" class="btn btn-primary w-100">Get Weather</button>
            </div>
          </div>
        </div>
<!--Left Card that shows the current temperature, humidity, and wind as well as shows icon based off weather-->
        <div class="row justify-content-center mt-1 g-0">
          <div class="col-11 col-md-6">
            <div class="card shadow-sm mt-0 py-5 h-100">
              <div class="card-body">
                <div class="row align-items-center text-center">
                  <div class="col-6">
                    <h1 id="txtCurrentTemp" class="display-4 mb-0 text-nowrap">72°F</h1>
                    <p id="txtCurrentCondition" class="mb-0">Clear Sky</p>
                  </div>

                  <div class="col-6">
                    <i id="txtCurrentIcon" class="bi bi-sun-fill text-warning" style="font-size: 70px"></i>
                  </div>
                </div>

                <hr />

                <div class="row text-center">
                  <div class="col-6">
                    <p id="txtHumidity">Humidity: 55%</p>
                  </div>

                  <div class="col-6">
                    <p id="txtWind">Wind: 6 mph</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
<!--Right card that shows the upcoming weather for Today =, Tonight, and Tomorrow-->
          <div class="col-11 col-md-6">
            <div class="card shadow-sm mt-0 py-5 h-100">
              <div class="card-body text-center">
                <h5 class="mb-4">Upcoming Weather</h5>
                <div class="row align-items-center mb-3">
                    <div class="col-4">
                        <p class="mb-0">Today</p>
                    </div>
                    <div class="col-4">
                        <i class="bi bi-sun text-warning"></i>
                    </div>
                    <div class="col-4">
                        <p id="txtTodayForecast" class="mb-0">72°F</p>
                    </div>
                </div>
                <div class="row align-items-center mb-3">
                    <div class="col-4">
                        <p class="mb-0">Tonight</p>
                    </div>
                    <div class="col-4">
                        <i class="bi bi-moon-stars text-secondary"></i> 
                    </div>
                    <div class="col-4">
                        <p id="txtTonightForecast" class="mb-0">58°F</p>
                    </div>
                </div>
                <div class="row align-items-center">
                    <div class="col-4">
                        <p class="mb-0">Tomorrow</p>
                    </div>
                    <div class="col-4">
                        <i class="bi bi-cloud-sun text-warning"></i>
                    </div>
                    <div class="col-4">
                        <p id="txtTomorrowForecast" class="mb-0">70°F</p>
                    </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="bg-light border rounded-bottom text-center py-2 mt-1">
          <small class="text-muted">
            Weather data from
            <a href="https://open-meteo.com/" target="_blank">Open-Meteo</a>
          </small>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
      const strWeatherUrl = "https://api.open-meteo.com/v1/forecast"; //API to pull weather information based off city
      const strSearchUrl = "https://geocoding-api.open-meteo.com/v1/search"; //API for the geolocation when user inputs the city

      document.querySelector("#btnGetWeather").addEventListener("click", () => {
        const strCity = document.querySelector("#txtCityInput").value.trim();

        //If the user doesn't input a city it gives an error 
        if (strCity == "") {
          Swal.fire({
            title: "City Name Required",
            text: "Please enter a city name to get the weather.",
            icon: "warning"
          });
        } else {
          getCoordinates(strCity);
        }
      });

      function getCoordinates(strCity) {
        //Pulls the geo location from user input with the url of the geo locator
        //Add query parameters that limit the search to the first city that pops up 
        fetch(
          strSearchUrl + "?name=" + strCity + "&count=1&language=en&format=json"
        )
          .then(response => {
            if (response.ok) {
              return response.json();
            } else {
              throw new Error(response.status);
            }
          })
          .then(data => {
            if (data.results && data.results.length > 0) {
              const decLatitude = data.results[0].latitude;
              const decLongitude = data.results[0].longitude;
              const strLocationName = data.results[0].name;

              document.querySelector("#txtCityInput").value = strLocationName;

              getWeather(decLatitude, decLongitude);
            } else {
              Swal.fire({
                title: "City Not Found",
                text: "Please enter a valid city name.",
                icon: "error"
              });
            }
          })
          .catch(error => {
            console.error(error);
            Swal.fire({
              title: "Oh no, you have an error!",
              text: "Unable to retrieve city information.",
              icon: "error"
            });
          });
      }

      //Function that gets weather code with the longitude and latitude based off the city the user inputs
      function getWeather(decLatitude, decLongitude) {
        fetch(
          strWeatherUrl +
            "?latitude=" +
            decLatitude +
            "&longitude=" +
            decLongitude +
            "&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code" +
            "&daily=temperature_2m_max,temperature_2m_min" +
            "&temperature_unit=fahrenheit" +
            "&wind_speed_unit=mph" +
            "&timezone=auto"
        )
          .then(response => {
            if (response.ok) {
              return response.json();
            } else {
              throw new Error(response.status);
            }
          })
          .then(data => {
            document.querySelector("#txtCurrentTemp").innerHTML = data.current.temperature_2m + "°F";

            document.querySelector("#txtHumidity").innerHTML = "Humidity: " + data.current.relative_humidity_2m + "%";

            document.querySelector("#txtWind").innerHTML = "Wind: " + data.current.wind_speed_10m + " mph";

            document.querySelector("#txtTodayForecast").innerHTML = data.daily.temperature_2m_max[0] + "°F";

            document.querySelector("#txtTonightForecast").innerHTML = data.daily.temperature_2m_min[0] + "°F";

            document.querySelector("#txtTomorrowForecast").innerHTML = data.daily.temperature_2m_max[1] + "°F";

            //Conditional statements based off weather code
            //If the weather code is in a specific range, it will display the conditions and the image
            if (data.current.weather_code == 0) 
            {
              document.querySelector("#txtCurrentCondition").innerHTML = "Clear Sky";
              document.querySelector("#txtCurrentIcon").className = "bi bi-sun-fill text-warning";
            } else if (data.current.weather_code >= 1 && data.current.weather_code <= 3) 
            {
              document.querySelector("#txtCurrentCondition").innerHTML = "Partly Cloudy";
              document.querySelector("#txtCurrentIcon").className = "bi bi-cloud-sun-fill text-warning";
            } else if (data.current.weather_code >= 45 && data.current.weather_code <= 48) 
            {
              document.querySelector("#txtCurrentCondition").innerHTML = "Foggy";
              document.querySelector("#txtCurrentIcon").className = "bi bi-cloud-fog-fill text-secondary";
            } else if (data.current.weather_code >= 51 && data.current.weather_code <= 67) 
            {
              document.querySelector("#txtCurrentCondition").innerHTML = "Rainy";
              document.querySelector("#txtCurrentIcon").className = "bi bi-cloud-rain-fill text-primary";
            } else if (data.current.weather_code >= 71 && data.current.weather_code <= 77) 
            {
              document.querySelector("#txtCurrentCondition").innerHTML = "Snowy";
              document.querySelector("#txtCurrentIcon").className = "bi bi-snow text-info";
            } else if (data.current.weather_code >= 80 && data.current.weather_code <= 82) 
            {
              document.querySelector("#txtCurrentCondition").innerHTML = "Rain Showers";
              document.querySelector("#txtCurrentIcon").className = "bi bi-cloud-rain-heavy-fill text-primary";
            } else if (data.current.weather_code >= 95 && data.current.weather_code <= 99) 
            {
              document.querySelector("#txtCurrentCondition").innerHTML = "Thunderstorm";
              document.querySelector("#txtCurrentIcon").className = "bi bi-cloud-lightning-rain-fill text-warning";
            } else 
            {
              document.querySelector("#txtCurrentCondition").innerHTML = "Unknown";
              document.querySelector("#txtCurrentIcon").className = "bi bi-cloud-fill text-secondary";
            }
            //Changes the size of the current icon on the webage 
            document.querySelector("#txtCurrentIcon").style.fontSize = "70px";
          })
          .catch(error => {
            console.error(error);
            Swal.fire({
              title: "Oh no, you have an error!",
              text: "Unable to retrieve weather information.",
              icon: "error"
            });
          });
      }
    </script>
  </body>
</html>
